name: Bug report
description: Report an incorrect calculation, missing option, or app behavior problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is wrong?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Taurus version
      placeholder: "V1.3.4"
    validations:
      required: true
  - type: textarea
    id: selection
    attributes:
      label: Selected options
      description: Brand, camera, codec, resolution/format, frame rate, and media.
      placeholder: "Brand: ARRI; Camera: ALEXA 35; Codec: ARRIRAW; ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: false
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: false
  - type: textarea
    id: source
    attributes:
      label: Source / evidence
      description: Manufacturer manual, firmware release notes, official website, or test result.
    validations:
      required: false
